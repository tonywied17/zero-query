<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1f2e"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="zGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#79c0ff"/>
      <stop offset="50%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#1f6feb"/>
    </linearGradient>

    <!-- Base glow filter -->
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="16" result="blur"/>
      <feFlood flood-color="#1f6feb" flood-opacity="0.4" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Animated breathing glow behind Z -->
    <filter id="glowBreath" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" result="blur">
        <animate attributeName="stdDeviation" values="18;28;18" dur="4s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
      </feGaussianBlur>
      <feFlood flood-color="#58a6ff" result="color">
        <animate attributeName="flood-opacity" values="0.3;0.55;0.3" dur="4s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
      </feFlood>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft particle glow -->
    <filter id="particleGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>

    <!-- Radial ambient glow -->
    <radialGradient id="ambientGlow" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#1f6feb" stop-opacity="0">
        <animate attributeName="stop-opacity" values="0;0.07;0" dur="4s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
      </stop>
      <stop offset="100%" stop-color="#1f6feb" stop-opacity="0"/>
    </radialGradient>

    <!-- Clip to rounded rect -->
    <clipPath id="clip">
      <rect width="512" height="512" rx="88"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip)">
    <!-- Background -->
    <rect width="512" height="512" fill="url(#bg)"/>

    <!-- Ambient radial pulse behind everything -->
    <rect width="512" height="512" fill="url(#ambientGlow)"/>

    <!-- ==================== COMET ==================== -->
    <!-- 4 comets on different angles, each fires every 24s, staggered 6s apart -->

    <!-- Comet 1: top-left → bottom-right -->
    <g>
      <g>
        <animateTransform attributeName="transform" type="translate" values="-100,-40; 580,180" dur="1.8s" begin="0s; 24s; 48s; 72s; 96s" fill="freeze" calcMode="spline" keySplines="0.1 0 0.3 1"/>
        <circle cx="0" cy="0" r="3" fill="#c9d1d9" opacity="0.9"/>
        <circle cx="0" cy="0" r="6" fill="#79c0ff" opacity="0.25"/>
        <line x1="0" y1="0" x2="-45" y2="-15" stroke="#79c0ff" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
        <line x1="-45" y1="-15" x2="-100" y2="-30" stroke="#58a6ff" stroke-width="1" stroke-linecap="round" opacity="0.25"/>
      </g>
      <animate attributeName="opacity" values="1;1;0" dur="1.8s" begin="0s; 24s; 48s; 72s; 96s" fill="freeze" keyTimes="0;0.85;1"/>
    </g>

    <!-- Comet 2: right → left (upper area) -->
    <g>
      <g>
        <animateTransform attributeName="transform" type="translate" values="600,60; -100,120" dur="1.8s" begin="6s; 30s; 54s; 78s; 102s" fill="freeze" calcMode="spline" keySplines="0.1 0 0.3 1"/>
        <circle cx="0" cy="0" r="2.5" fill="#c9d1d9" opacity="0.85"/>
        <circle cx="0" cy="0" r="5" fill="#79c0ff" opacity="0.2"/>
        <line x1="0" y1="0" x2="50" y2="-5" stroke="#79c0ff" stroke-width="1.8" stroke-linecap="round" opacity="0.6"/>
        <line x1="50" y1="-5" x2="110" y2="-10" stroke="#58a6ff" stroke-width="0.9" stroke-linecap="round" opacity="0.25"/>
      </g>
      <animate attributeName="opacity" values="1;1;0" dur="1.8s" begin="6s; 30s; 54s; 78s; 102s" fill="freeze" keyTimes="0;0.85;1"/>
    </g>

    <!-- Comet 3: bottom-left → upper-right -->
    <g>
      <g>
        <animateTransform attributeName="transform" type="translate" values="-80,500; 560,30" dur="2s" begin="12s; 36s; 60s; 84s; 108s" fill="freeze" calcMode="spline" keySplines="0.1 0 0.3 1"/>
        <circle cx="0" cy="0" r="2.5" fill="#c9d1d9" opacity="0.85"/>
        <circle cx="0" cy="0" r="5.5" fill="#79c0ff" opacity="0.2"/>
        <line x1="0" y1="0" x2="-40" y2="30" stroke="#79c0ff" stroke-width="1.8" stroke-linecap="round" opacity="0.55"/>
        <line x1="-40" y1="30" x2="-90" y2="65" stroke="#58a6ff" stroke-width="0.9" stroke-linecap="round" opacity="0.2"/>
      </g>
      <animate attributeName="opacity" values="1;1;0" dur="2s" begin="12s; 36s; 60s; 84s; 108s" fill="freeze" keyTimes="0;0.85;1"/>
    </g>

    <!-- Comet 4: top-right → bottom-left (steep) -->
    <g>
      <g>
        <animateTransform attributeName="transform" type="translate" values="550,-60; -60,520" dur="2s" begin="18s; 42s; 66s; 90s; 114s" fill="freeze" calcMode="spline" keySplines="0.1 0 0.3 1"/>
        <circle cx="0" cy="0" r="2.8" fill="#c9d1d9" opacity="0.9"/>
        <circle cx="0" cy="0" r="5" fill="#79c0ff" opacity="0.22"/>
        <line x1="0" y1="0" x2="40" y2="-38" stroke="#79c0ff" stroke-width="1.8" stroke-linecap="round" opacity="0.55"/>
        <line x1="40" y1="-38" x2="85" y2="-80" stroke="#58a6ff" stroke-width="0.9" stroke-linecap="round" opacity="0.2"/>
      </g>
      <animate attributeName="opacity" values="1;1;0" dur="2s" begin="18s; 42s; 66s; 90s; 114s" fill="freeze" keyTimes="0;0.85;1"/>
    </g>

    <!-- ==================== PARTICLES ==================== -->
    <!-- Soft luminous particles that slowly rise/drift — no harsh shapes -->

    <!-- Particle cluster: bottom → up, staggered -->
    <circle cx="80" cy="480" r="1.5" fill="#58a6ff" opacity="0" filter="url(#particleGlow)">
      <animate attributeName="opacity" values="0;0.5;0.4;0" dur="10s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="480;60" dur="10s" repeatCount="indefinite"/>
    </circle>
    <circle cx="160" cy="500" r="1" fill="#79c0ff" opacity="0" filter="url(#particleGlow)">
      <animate attributeName="opacity" values="0;0.4;0.35;0" dur="12s" begin="2s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="500;40" dur="12s" begin="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="400" cy="490" r="1.2" fill="#58a6ff" opacity="0" filter="url(#particleGlow)">
      <animate attributeName="opacity" values="0;0.45;0.3;0" dur="11s" begin="1s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="490;50" dur="11s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="450" cy="510" r="0.8" fill="#79c0ff" opacity="0" filter="url(#particleGlow)">
      <animate attributeName="opacity" values="0;0.35;0.3;0" dur="14s" begin="4s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="510;30" dur="14s" begin="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="60" cy="500" r="1" fill="#58a6ff" opacity="0" filter="url(#particleGlow)">
      <animate attributeName="opacity" values="0;0.4;0.2;0" dur="13s" begin="6s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="500;20" dur="13s" begin="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="310" cy="520" r="1.3" fill="#79c0ff" opacity="0" filter="url(#particleGlow)">
      <animate attributeName="opacity" values="0;0.4;0.35;0" dur="11s" begin="3s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="520;50" dur="11s" begin="3s" repeatCount="indefinite"/>
    </circle>

    <!-- Slower, gentler particles with slight X drift -->
    <circle cx="220" cy="510" r="0.9" fill="#58a6ff" opacity="0" filter="url(#particleGlow)">
      <animate attributeName="opacity" values="0;0.3;0.25;0" dur="16s" begin="1.5s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="510;-10" dur="16s" begin="1.5s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="220;240" dur="16s" begin="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="350" cy="495" r="0.7" fill="#79c0ff" opacity="0" filter="url(#particleGlow)">
      <animate attributeName="opacity" values="0;0.35;0.2;0" dur="15s" begin="5s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="495;10" dur="15s" begin="5s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="350;335" dur="15s" begin="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="120" cy="505" r="1.1" fill="#58a6ff" opacity="0" filter="url(#particleGlow)">
      <animate attributeName="opacity" values="0;0.4;0.3;0" dur="13s" begin="7s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="505;25" dur="13s" begin="7s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="120;135" dur="13s" begin="7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="470" cy="500" r="0.8" fill="#79c0ff" opacity="0" filter="url(#particleGlow)">
      <animate attributeName="opacity" values="0;0.3;0.2;0" dur="14s" begin="8s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="500;20" dur="14s" begin="8s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="470;455" dur="14s" begin="8s" repeatCount="indefinite"/>
    </circle>

    <!-- A few dim white specks for star-like depth -->
    <circle cx="48" cy="65" r="0.6" fill="#c9d1d9" opacity="0">
      <animate attributeName="opacity" values="0;0.4;0" dur="5s" begin="0s" repeatCount="indefinite"/>
    </circle>
    <circle cx="460" cy="50" r="0.5" fill="#c9d1d9" opacity="0">
      <animate attributeName="opacity" values="0;0.35;0" dur="6s" begin="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="40" cy="445" r="0.6" fill="#c9d1d9" opacity="0">
      <animate attributeName="opacity" values="0;0.3;0" dur="7s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="470" cy="440" r="0.5" fill="#c9d1d9" opacity="0">
      <animate attributeName="opacity" values="0;0.4;0" dur="5.5s" begin="3s" repeatCount="indefinite"/>
    </circle>

    <!-- ==================== Z LIGHTNING BOLT ==================== -->
    <g filter="url(#glowBreath)">
      <g>
        <animateTransform attributeName="transform" type="translate" values="0,0; 7,-5; -3.5,8; 5.5,3.5; -7,-2.5; 2,-7.5; -5,6; 7,-2; -2.5,7; 4.5,-5; 0,0" dur="16s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
        <animateTransform attributeName="transform" type="rotate" values="0 256 256; 1.5 256 256; -1 256 256; 0.8 256 256; -1.4 256 256; 0.5 256 256; 0 256 256" dur="20s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1" additive="sum"/>
        <path d="M 128,120 H 384 V 172
                 L 300,256 L 316,256 L 232,340
                 H 384 V 392 H 128 V 340
                 L 212,256 L 228,256 L 312,172
                 H 128 Z"
              fill="url(#zGrad)"/>
      </g>
    </g>
  </g>

  <!-- Border -->
  <rect x="2" y="2" width="508" height="508" rx="86" fill="none" stroke="#30363d" stroke-width="2"/>
</svg>
